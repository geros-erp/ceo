spring.datasource.url=jdbc:postgresql://localhost:5432/geros
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=${app.timezone}

jwt.secret=${JWT_SECRET:geros-secret-key-change-in-production}
jwt.expiration=86400000

# reCaptcha v3 (claves de prueba para localhost)
# Reemplazar con claves reales en produccion: https://www.google.com/recaptcha/admin
recaptcha.secret=${RECAPTCHA_SECRET:6LeIxAcTAAAAAGG-vFI1TnRWxMZNFuojJ4WifJWe}
recaptcha.min-score=0.5

spring.data.web.pageable.one-indexed-parameters=false
spring.mvc.pathmatch.use-suffix-pattern=false
spring.jackson.time-zone=${app.timezone}

app.timezone=${APP_TIMEZONE:America/Bogota}
app.security-log-export-dir=${APP_SECURITY_LOG_EXPORT_DIR:./storage/security-log-exports}
app.security-log.read-only=${APP_SECURITY_LOG_READ_ONLY:true}
app.security-log.online-retention-days=${APP_SECURITY_LOG_ONLINE_RETENTION_DAYS:365}
app.security-alert.enabled=${APP_SECURITY_ALERT_ENABLED:false}
app.security-alert.email-recipients=${APP_SECURITY_ALERT_EMAIL_RECIPIENTS:}
app.security-alert.webhook-urls=${APP_SECURITY_ALERT_WEBHOOK_URLS:}
app.security-alert.actions=${APP_SECURITY_ALERT_ACTIONS:LOGIN_FAILED,ACCOUNT_LOCKED,LOGIN_OUTSIDE_ALLOWED_HOURS,PRIVILEGED_USER_ACTIVITY,IMPORTANT_FILE_MODIFIED,PASSWORD_POLICY_UPDATED,USER_CREATED,USER_UPDATED,USER_DELETED,ROLE_CREATED,ROLE_UPDATED,ROLE_DELETED,AUTHORIZATION_PARAMETERS_UPDATED,SECURITY_LOG_EXPORTED}
app.auth.max-concurrent-sessions=${APP_AUTH_MAX_CONCURRENT_SESSIONS:5}
app.security-alert.allowed-login-start=${APP_SECURITY_ALERT_ALLOWED_LOGIN_START:06:00}
app.security-alert.allowed-login-end=${APP_SECURITY_ALERT_ALLOWED_LOGIN_END:22:00}
app.security-alert.monitored-files=${APP_SECURITY_ALERT_MONITORED_FILES:src/main/resources/application.properties,src/main/resources/geros-keystore.p12}
app.security-alert.file-check-interval-ms=${APP_SECURITY_ALERT_FILE_CHECK_INTERVAL_MS:60000}

app.security.csp-policy=default-src 'self'; script-src 'self' https://www.gstatic.com https://www.google.com https://www.recaptcha.net https://cdn.jsdelivr.net 'unsafe-inline'; frame-src https://www.google.com https://www.recaptcha.net https://recaptcha.google.com; connect-src 'self' https://www.google.com https://www.gstatic.com https://recaptcha.google.com; img-src 'self' data: https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; form-action 'self'; frame-ancestors 'self';

# HTTPS
# Puerto HTTPS (8443 desarrollo, 443 produccion)
server.port=8443
server.ssl.enabled=true
server.ssl.key-store=classpath:geros-keystore.p12
server.ssl.key-store-password=${SSL_KEYSTORE_PASSWORD:geros2024}
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=geros

# En produccion reemplazar el keystore con un certificado real:
# server.ssl.key-store=file:/ruta/al/certificado.p12
# server.ssl.key-store-password=${SSL_KEYSTORE_PASSWORD}

# Habilitar la inicialización de la base de datos
# Durante desarrollo local queremos que los scripts se ejecuten para crear el esquema.
# Restaurado a 'always' — asegúrate de correr los pasos para limpiar/recrear la BD antes
# de reiniciar la aplicación para evitar errores por objetos existentes.
spring.sql.init.mode=always
# Ubicación del script (coincidiendo con la ruta en tu proyecto)
spring.sql.init.schema-locations=classpath:db/init.sql
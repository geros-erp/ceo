# ═══════════════════════════════════════════════════════════════════════════════
# CONFIGURACIÓN DE WS-SECURITY PARA CONSUMO DE SERVICIOS WEB
# ═══════════════════════════════════════════════════════════════════════════════
# 
# Cumple con estándares de seguridad Promigas:
# - WS-Security 1.0
# - PKI con certificados digitales (llave privada/pública)
# - Firma digital del cuerpo del mensaje (request/response)
# - No repudio mediante auditoría de mensajes
# - TLS 1.2 para transporte seguro
#
# ═══════════════════════════════════════════════════════════════════════════════

# ───────────────────────────────────────────────────────────────────────────────
# KEYSTORE (Certificado privado del cliente)
# ───────────────────────────────────────────────────────────────────────────────
# Contiene el certificado privado y la llave privada para:
# - Firmar digitalmente los mensajes SOAP (request)
# - Autenticación del cliente en TLS mutuo (mTLS)
#
# Formato recomendado: PKCS12 (.p12 o .pfx)
# Longitud de llave: 4096 bits (requerido por Promigas para certificados EV)
# ───────────────────────────────────────────────────────────────────────────────

ws.security.keystore.path=classpath:certificates/client-keystore.p12
ws.security.keystore.password=${WS_KEYSTORE_PASSWORD:changeit}
ws.security.keystore.type=PKCS12

# Alias del certificado dentro del keystore
ws.security.key.alias=geros-client
ws.security.key.password=${WS_KEY_PASSWORD:changeit}

# ───────────────────────────────────────────────────────────────────────────────
# TRUSTSTORE (Certificados públicos de servidores)
# ───────────────────────────────────────────────────────────────────────────────
# Contiene los certificados públicos de las CAs y servidores para:
# - Validar la firma digital de los mensajes SOAP (response)
# - Validar el certificado del servidor en TLS
#
# Debe incluir:
# - Certificado de la CA que firmó el certificado del servidor
# - Certificados intermedios si existen
# - Certificado raíz de Promigas (para servicios internos)
# ───────────────────────────────────────────────────────────────────────────────

ws.security.truststore.path=classpath:certificates/client-truststore.p12
ws.security.truststore.password=${WS_TRUSTSTORE_PASSWORD:changeit}
ws.security.truststore.type=PKCS12

# ───────────────────────────────────────────────────────────────────────────────
# URL DEL SERVICIO WEB EXTERNO
# ───────────────────────────────────────────────────────────────────────────────
# URL del endpoint SOAP del servicio externo
# Debe usar HTTPS con TLS 1.2
# ───────────────────────────────────────────────────────────────────────────────

ws.external.service.url=https://servicios.promigas.com/soap/endpoint

# ═══════════════════════════════════════════════════════════════════════════════
# NOTAS IMPORTANTES
# ═══════════════════════════════════════════════════════════════════════════════
#
# 1. GENERACIÓN DE CERTIFICADOS:
#    Para generar un keystore con certificado autofirmado (desarrollo):
#    
#    keytool -genkeypair -alias geros-client -keyalg RSA -keysize 4096 \
#            -validity 365 -keystore client-keystore.p12 -storetype PKCS12 \
#            -dname "CN=GEROS Client, OU=IT, O=GEROS, L=Barranquilla, ST=Atlantico, C=CO"
#
# 2. EXPORTAR CERTIFICADO PÚBLICO:
#    Para compartir tu certificado público con el proveedor del servicio:
#    
#    keytool -exportcert -alias geros-client -keystore client-keystore.p12 \
#            -storetype PKCS12 -file geros-client.cer
#
# 3. IMPORTAR CERTIFICADO DEL SERVIDOR AL TRUSTSTORE:
#    Para confiar en el certificado del servidor:
#    
#    keytool -importcert -alias server-cert -file server.cer \
#            -keystore client-truststore.p12 -storetype PKCS12
#
# 4. PRODUCCIÓN:
#    En producción, usar certificados firmados por una CA reconocida:
#    - Para servicios expuestos a internet: CA pública con Extended Validation (EV)
#    - Para servicios internos: CA de Promigas
#    - Longitud de llave: 4096 bits
#    - Algoritmo: RSA con SHA-256
#
# 5. UBICACIÓN DE CERTIFICADOS:
#    - Desarrollo: src/main/resources/certificates/
#    - Producción: /opt/geros/certificates/ (fuera del JAR)
#    - Permisos: 600 (solo lectura para el usuario de la aplicación)
#
# 6. ROTACIÓN DE CERTIFICADOS:
#    - Monitorear fechas de expiración
#    - Renovar certificados 30 días antes del vencimiento
#    - Mantener respaldos de certificados antiguos para auditoría
#
# 7. AUDITORÍA Y NO REPUDIO:
#    - Todos los mensajes SOAP se registran en el log con hash SHA-256
#    - Los logs incluyen timestamp preciso y firma digital
#    - Configurar rotación de logs para cumplir con retención de auditoría
#
# ═══════════════════════════════════════════════════════════════════════════════
